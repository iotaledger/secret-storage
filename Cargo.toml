[package]
name = "secret-storage"
version = "0.3.0"
edition = "2021"
authors = ["IOTA Stiftung"]
homepage = "https://www.iota.org"
license = "Apache-2.0"
repository = "https://github.com/iotaledger/secret-storage"
rust-version = "1.65"
readme = "./README.md"
description = "A flexible and secure key storage interface for working with cryptographic keys and signatures with modular traits for key generation, signing, and management."
keywords = ["crypto", "storage", "keys", "signatures", "security"]

[dependencies]
anyhow = { version = "1", optional = true }
thiserror = { version = "2", optional = true, default-features = false }
async-trait = { version = "0.1", optional = true }

[features]
default = ["std", "send-sync-storage"]
std = ["anyhow", "thiserror/std", "async-trait"]
send-sync-storage = []
no-std = ["thiserror", "async-trait"]
