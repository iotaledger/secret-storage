[workspace]
resolver = "2"
members = [
    "core/secret-storage",
    "adapters/aws-kms-adapter",
    "adapters/vault-adapter",
    "applications/storage-factory",
    "applications/hv-iota-e2e-test",
    "integration/multi-signature-scheme",
    "integration/multi-signature-scheme-to-iota",
]

exclude = [
    "adapters/aws-kms-adapter/bindings/wasm/aws-kms-adapter-wasm",
    "integration/multi-signature-scheme-to-iota-wasm",
]

[workspace.dependencies]
anyhow = "1"
thiserror = "2"
async-trait = "0.1"

[patch."https://github.com/iotaledger/secret-storage.git"]
secret-storage = { path = "core/secret-storage", package = "secret-storage" }

[patch."https://tbd-github.com/iotaledger/aws-kms-adapter.git"]
aws-kms-adapter = { path = "adapters/aws-kms-adapter", package = "aws-kms-adapter" }

[patch."https://tbd-github.com/iotaledger/multi-signature-scheme.git"]
multi-signature-scheme = { path = "integration/multi-signature-scheme" }

[patch."https://tbd-github.com/iotaledger/multi-signature-scheme-to-iota.git"]
multi-signature-scheme-to-iota = { path = "integration/multi-signature-scheme-to-iota" }
