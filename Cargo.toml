[workspace]
resolver = "2"
members = [
    "core/secret-storage",
    "adapters/aws-kms-adapter",
    "adapters/vault-adapter",
    "applications/storage-factory",
    "applications/hv-iota-e2e-test",
    "integration/typed-key-signature",
    "integration/typed-key-signature-to-iota",
]

exclude = [
    "adapters/aws-kms-adapter/bindings/wasm/aws-kms-adapter-wasm",
    "integration/typed-key-signature-to-iota/bindings/wasm/typed_key_signature_to_iota_wasm",
]

[workspace.dependencies]
anyhow = "1"
thiserror = "2"
async-trait = "0.1"

[patch."https://github.com/iotaledger/secret-storage.git"]
secret-storage = { path = "core/secret-storage", package = "secret-storage" }

[patch."https://tbd-github.com/iotaledger/aws-kms-adapter.git"]
aws-kms-adapter = { path = "adapters/aws-kms-adapter", package = "aws-kms-adapter" }

[patch."https://tbd-github.com/iotaledger/typed-key-signature.git"]
typed-key-signature = { path = "integration/typed-key-signature" }

[patch."https://tbd-github.com/iotaledger/typed-key-signature-to-iota.git"]
typed-key-signature-to-iota = { path = "integration/typed-key-signature-to-iota" }
