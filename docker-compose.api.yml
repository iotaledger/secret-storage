#
# Simplified Docker Compose for IOTA Secret Storage Transaction API
#
# Prerequisites:
# - Start Vault first: docker-compose -f docker-compose.vault.yml up -d
#
# Usage:
#   docker-compose -f docker-compose.vault.yml up -d    # Start Vault
#   docker-compose -f docker-compose.api.yml up -d      # Start API
#   curl http://localhost:3000/health                   # Test API
#

services:
  # IOTA Transaction API Service (connects to external Vault)
  transaction-api:
    build:
      context: .
      dockerfile: applications/transaction-api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # Vault Configuration (connect to vault network)
      VAULT_ADDR: http://iota-vault-dev:8200
      VAULT_TOKEN: dev-token
      VAULT_MOUNT_PATH: transit

      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 3001

      # IOTA Configuration
      IOTA_NETWORK: testnet
      ENVIRONMENT: development

      # Logging
      RUST_LOG: info,transaction_api=debug,secret_storage_core=debug

    # Run the transaction API
    command: ["./transaction-api"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    labels:
      - "service.type=api"
      - "service.component=transaction-orchestrator"
      - "service.environment=simplified"

# Connect to the vault network
networks:
  default:
    name: iota-vault-network
    external: true