#
# Docker Compose configuration for HashiCorp Vault development environment
#
# This setup provides:
# - Vault server in development mode
# - Transit secrets engine pre-enabled
# - UI available at http://localhost:8200/ui
# - Root token: dev-token
#
# Usage:
#   docker-compose -f docker-compose.vault.yml up -d
#   docker-compose -f docker-compose.vault.yml down
#
# Environment variables for testing:
#   export VAULT_ADDR="http://localhost:8200"
#   export VAULT_TOKEN="dev-token"
#   export VAULT_MOUNT_PATH="transit"
#

version: '3.8'

services:
  vault:
    image: vault:1.15
    container_name: iota-vault-dev
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_UI: true
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - vault-data:/vault/data
      - vault-logs:/vault/logs
    command: >
      sh -c "
        vault server -dev 
        -dev-root-token-id=dev-token 
        -dev-listen-address=0.0.0.0:8200
      "

  # Service to automatically enable transit engine
  vault-init:
    image: vault:1.15
    container_name: iota-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
    command: >
      sh -c "
        echo 'Waiting for Vault to be ready...' &&
        sleep 5 &&
        echo 'Enabling Transit secrets engine...' &&
        vault secrets enable -path=transit transit &&
        echo 'Transit engine enabled successfully!' &&
        echo 'Vault is ready for IOTA Secret Storage testing.'
      "
    restart: "no"

volumes:
  vault-data:
    driver: local
  vault-logs:
    driver: local

networks:
  default:
    name: iota-vault-network